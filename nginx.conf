# ── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS server ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name 18.116.13.255.nip.io;

    # SSL certificates (mounted from host via docker-compose volume)
    ssl_certificate     /etc/letsencrypt/live/18.116.13.255.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/18.116.13.255.nip.io/privkey.pem;

    # Modern SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Increase timeout for LLM calls (can take 30-60 s) ───────────────────
    proxy_read_timeout  120s;
    proxy_send_timeout  120s;
    proxy_connect_timeout 10s;

    # ── Backend API proxy ─────────────────────────────────────────────────────
    location ~ ^/(query|sessions?|ingest)(/.*)?$ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── FastAPI auto-docs ────────────────────────────────────────────────────
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── React SPA ────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
