server {
    listen 80;
    server_name _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Increase timeout for LLM calls (can take 30-60 s) ───────────────────
    proxy_read_timeout  120s;
    proxy_send_timeout  120s;
    proxy_connect_timeout 10s;

    # ── Backend API proxy ─────────────────────────────────────────────────────
    # Routes: /query  /sessions  /session/*  /ingest
    # These are forwarded to the backend container on the Docker network.
    location ~ ^/(query|sessions?|ingest)(/.*)?$ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── FastAPI auto-docs (optional, useful for debugging on EC2) ────────────
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── React SPA – serve static assets, fallback to index.html ─────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
